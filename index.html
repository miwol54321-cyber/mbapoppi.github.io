<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>귀여움이 세상을 구한다</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(180deg, #fff3f7, #f2fbf8);
      color: #333;
    }

    .wrap {
      width: min(100% - 32px, 520px);
      margin: 0 auto;
      padding: 40px 0 60px;
    }

    .profile {
      text-align: center;
      margin-bottom: 28px;
    }

    .profile-icon {
      width: 94px;
      height: 94px;
      margin: 0 auto 16px;
      border-radius: 28px;
      background: #ffd8e6;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 44px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }

    h1 {
      margin: 0 0 10px;
      font-size: 28px;
    }

    .intro {
      margin: 0;
      line-height: 1.7;
      color: #666;
      font-size: 15px;
    }

    .featured {
      display: block;
      padding: 22px;
      margin-bottom: 16px;
      border-radius: 24px;
      text-decoration: none;
      color: #222;
      background: linear-gradient(135deg, #ffd8e6, #fff1bf);
      box-shadow: 0 12px 30px rgba(0,0,0,0.09);
      transition: transform 0.2s ease;
    }

    .featured:hover {
      transform: translateY(-3px);
    }

    .featured small {
      display: block;
      margin-bottom: 7px;
      font-weight: bold;
      color: #9d5873;
    }

    .featured strong {
      font-size: 20px;
    }

    .category {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 18px;
    }

    .button {
      display: flex;
      min-height: 92px;
      padding: 16px;
      border-radius: 22px;
      align-items: center;
      justify-content: center;
      text-align: center;
      text-decoration: none;
      color: #333;
      background: rgba(255,255,255,0.88);
      box-shadow: 0 8px 22px rgba(0,0,0,0.07);
      font-weight: bold;
      line-height: 1.5;
      transition: transform 0.2s ease;
    }

    .button:hover {
      transform: translateY(-3px);
    }

    .youtube {
      display: block;
      margin-top: 14px;
      padding: 17px;
      border-radius: 20px;
      text-align: center;
      text-decoration: none;
      color: white;
      background: #222;
      font-weight: bold;
    }

    .notice {
      margin-top: 28px;
      padding: 16px;
      border-radius: 18px;
      background: rgba(255,255,255,0.72);
      font-size: 12px;
      line-height: 1.6;
      color: #777;
    }
  </style>
</head>

<body>
  <main class="wrap">

    <section class="profile">
      <div class="profile-icon">🐶</div>
      <h1>귀여움이 세상을 구한다</h1>
      <p class="intro">
        귀엽고 실용적인 추천템만 소개해요 💕<br>
        영상 속 제품은 아래에서 확인하세요!
      </p>
    </section>

    <a class="featured" href="#" target="_blank">
      <small>⭐ 오늘 영상 상품</small>
      <strong>오늘 소개한 제품 보러 가기</strong>
    </a>

    <section class="category">
      <a class="button" href="#">🐶<br>강아지 간식 & 용품</a>
      <a class="button" href="#">🍳<br>쿠킹 & 주방용품</a>
      <a class="button" href="#">🎀<br>산리오 & 귀여운 굿즈</a>
      <a class="button" href="#">👜<br>생활 추천템</a>
    </section>

    <a class="youtube" href="#" target="_blank">
      📺 유튜브 구독하기
    </a>

    <div class="notice">
      쿠팡파트너스 활동을 통해 일정액의 수수료를 제공받을 수 있습니다.
    </div>

  </main>
</body>
</html>
